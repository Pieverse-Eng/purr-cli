name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      skip_release:
        description: 'Build binaries only (skip GitHub Release)'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: purr-linux-x64
            entrypoint: packages/cli/src/linux-macos.ts
            external: ''
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: purr-linux-arm64
            entrypoint: packages/cli/src/linux-macos.ts
            external: ''
          - os: macos-latest
            target: bun-darwin-x64
            artifact: purr-darwin-x64
            entrypoint: packages/cli/src/linux-macos.ts
            external: ''
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: purr-darwin-arm64
            entrypoint: packages/cli/src/linux-macos.ts
            external: ''
          - os: ubuntu-latest
            target: bun-windows-x64-baseline
            artifact: purr-windows-x64.exe
            entrypoint: packages/cli/src/windows.ts
            external: '--external @pieverseio/purr-plugin-ows'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build standalone binary
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          bun build ${{ matrix.entrypoint }} --compile --target=${{ matrix.target }} --outfile ${{ matrix.artifact }} --define "PURR_VERSION='${VERSION}'" ${{ matrix.external }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_release) }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/purr-darwin-x64
            artifacts/purr-darwin-arm64
            artifacts/purr-linux-x64
            artifacts/purr-linux-arm64
            artifacts/purr-windows-x64.exe
