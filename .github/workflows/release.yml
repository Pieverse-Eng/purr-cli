name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: purr-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: purr-linux-arm64
          - os: macos-latest
            target: bun-darwin-x64
            artifact: purr-darwin-x64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: purr-darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build standalone binary
        run: bun build src/main.ts --compile --target=${{ matrix.target }} --outfile ${{ matrix.artifact }} --define "PURR_VERSION='\"${GITHUB_REF_NAME}\"'"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/purr-darwin-x64
            artifacts/purr-darwin-arm64
            artifacts/purr-linux-x64
            artifacts/purr-linux-arm64
